<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Room Access Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <header class="hero">
        <div class="hero-content">
            <h1>Room Access Dashboard</h1>
            <p class="hero-subtitle">Quick access to all monitoring rooms</p>
        </div>
    </header>

    <div class="search-container">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search room...">
        </div>
    </div>

    <div id="roomContainer" class="room-container"></div>

    <!-- Script File -->
    <script src="script.js"></script>

</body>

</html>
