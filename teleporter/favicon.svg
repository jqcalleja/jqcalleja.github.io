<!-- Teleportation Portal Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="portal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#4e73df"/>
      <stop offset="70%" stop-color="#1cc88a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </radialGradient>
  </defs>

  <!-- Portal Circle -->
  <circle cx="50" cy="50" r="45" fill="url(#portal)" />

  <!-- Teleport Spark -->
  <polygon points="50,20 55,45 80,50 55,55 50,80 45,55 20,50 45,45"
           fill="white" opacity="0.9"/>
</svg>